<header class="lib-topbar">
  <a class="lib-topbar-brand" href="index.html"><span>njX UI</span></a>
  <div class="lib-topbar-sep"></div>
  <div class="lib-topbar-label">Theme</div>
  <div class="lib-theme-pills">
    <div class="lib-theme-pill active" style="--pill-color:#14a0ff" onclick="setTheme(this,'dark')" title="Dark"></div>
    <div class="lib-theme-pill" style="--pill-color:#e2e8f0" onclick="setTheme(this,'light')" title="Light"></div>
    <div class="lib-theme-pill" style="--pill-color:#f43f5e" onclick="setTheme(this,'red')" title="Red"></div>
    <div class="lib-theme-pill" style="--pill-color:#3b82f6" onclick="setTheme(this,'blue')" title="Blue"></div>
    <div class="lib-theme-pill" style="--pill-color:#22c55e" onclick="setTheme(this,'green')" title="Green"></div>
    <div class="lib-theme-pill" style="--pill-color:#00e5ff" onclick="setTheme(this,'cyan')" title="Cyan"></div>
    <div class="lib-theme-pill" style="--pill-color:#facc15" onclick="setTheme(this,'yellow')" title="Yellow"></div>
    <div class="lib-theme-pill" style="--pill-color:#ec4899" onclick="setTheme(this,'pink')" title="Pink"></div>
    <div class="lib-theme-pill" style="--pill-color:#a855f7" onclick="setTheme(this,'purple')" title="Purple"></div>
  </div>
  <!-- Search — centered absolutely -->
  <div class="lib-search" id="libSearch">
    <svg class="lib-search-icon" width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor"
      stroke-width="1.8" stroke-linecap="round">
      <circle cx="6.5" cy="6.5" r="4.5" />
      <path d="M10.5 10.5L14 14" />
    </svg>
    <input class="lib-search-input" id="libSearchInput" type="text" placeholder="Search components, utilities, tokens…"
      autocomplete="off" spellcheck="false">
    <kbd class="lib-search-kbd">⌘K</kbd>
    <div class="lib-search-dropdown" id="libSearchDropdown"></div>
  </div>

  <div class="lib-topbar-spacer"></div>
  <button class="lib-download-btn" id="downloadBtn" onclick="downloadCssZip()" title="Download CSS">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M7 1v8M4 6l3 3 3-3M2 10v1a1 1 0 001 1h8a1 1 0 001-1v-1" stroke="currentColor" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round" />
    </svg>
    Download CSS
  </button>
  <div class="lib-topbar-version">v1.0.3</div>
</header>
